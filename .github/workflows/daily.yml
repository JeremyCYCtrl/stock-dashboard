name: 股票儀表板每日更新

on:
  # 每天台灣時間 08:00（= UTC 00:00）執行，週一到週五
  schedule:
    - cron: "0 0 * * 1-5"

  # 可以在 GitHub 網頁手動觸發（測試用）
  workflow_dispatch:

# 授予寫入 repo 的權限（推 index.html 回去）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 取出程式碼
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. 安裝 Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 安裝依賴
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # 4. 執行股票腳本，產生 index.html
      - name: 📊 Run stock dashboard
        run: python stock_dashboard.py

      # 5. 把生成的 index.html 推回 repo
      - name: 💾 Commit & push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 若沒有變更就跳過 commit（避免空 commit 報錯）
          git diff --staged --quiet || git commit -m "📊 update dashboard $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
